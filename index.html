<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Light of Paradise</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
        canvas { display: block; border: 2px solid #333; cursor: pointer; max-width: 100%; max-height: 100vh; height: auto; touch-action: none; }

        #videoOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            transition: opacity 0.9s ease;
        }
        #introVideo {
            max-width: 100%; max-height: 90vh;
            display: block;
        }
        #skipHint {
            position: absolute; bottom: 28px;
            color: rgba(255,255,255,0.5);
            font-size: 13px; font-family: Arial, sans-serif;
            animation: blink 1.4s infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 0.5; }
            50%      { opacity: 1;   }
        }
    </style>
</head>
<body>
<div id="videoOverlay">
    <video id="introVideo" src="Light of paradise opening.mp4" autoplay muted playsinline></video>
    <div id="skipHint">Press SPACE, click, or tap to skip</div>
</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width  = 800;
canvas.height = 600;

// ── VIDEO INTRO ───────────────────────────────────────────────
let voidBgColor = '#a0a0a0'; // light grey, darker than the white player

(function setupVideoIntro() {
    const overlay = document.getElementById('videoOverlay');
    const video   = document.getElementById('introVideo');
    let dismissed = false;

    function captureLastFrameColor() {
        try {
            const oc   = document.createElement('canvas');
            oc.width   = video.videoWidth  || 640;
            oc.height  = video.videoHeight || 360;
            const octx = oc.getContext('2d');
            octx.drawImage(video, 0, 0, oc.width, oc.height);
            // Sample a 5×5 grid across the frame
            let r = 0, g = 0, b = 0, n = 0;
            for (let sx = 0.1; sx <= 0.95; sx += 0.2) {
                for (let sy = 0.1; sy <= 0.95; sy += 0.2) {
                    const d = octx.getImageData(
                        Math.floor(sx * oc.width),
                        Math.floor(sy * oc.height), 1, 1).data;
                    r += d[0]; g += d[1]; b += d[2]; n++;
                }
            }
            // Darken the average so it works as a subtle game background
            r = Math.floor(r / n * 0.32);
            g = Math.floor(g / n * 0.32);
            b = Math.floor(b / n * 0.32);
            voidBgColor = `rgb(${r},${g},${b})`;
        } catch (e) { /* keep default if CORS/decode fails */ }
    }

    function dismiss() {
        if (dismissed) return;
        dismissed = true;
        overlay.style.opacity = '0';
        overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
    }

    video.addEventListener('ended',   dismiss);
    overlay.addEventListener('click',      dismiss);
    overlay.addEventListener('touchstart', e => { e.preventDefault(); dismiss(); }, { passive: false });
    document.addEventListener('keydown', function onKey(e) {
        if (e.code === 'Space') { e.preventDefault(); dismiss(); document.removeEventListener('keydown', onKey); }
    });

    // Fallback: if video fails to load/play, still dismiss after a short wait
    video.addEventListener('error', () => setTimeout(dismiss, 100));
})();

// ── CONSTANTS ────────────────────────────────────────────────
const ROOM  = { VOID: 'void', HELL: 'hell', PARADISE: 'paradise' };
const POWER = { NONE: 'None', ICE: 'Ice', BRIMSTONE: 'Brimstone' };
const BASE_SPEED = 4;

const MAX_LEVELS = 20;

// ── LEVEL CONFIGURATIONS ─────────────────────────────────────
const LEVEL_CONFIGS = [
    { // Levels 1-6 – Standard
        ammoMax: 5, reloadFrames: 180,
        devilHp: 5, devilR: 28, devilSpeed: 0.9, devilShootRate: 190, devilShotsPerFire: 1,
        extraFireMonsters: 0, extraGhosts: 0,
        coinCount: 6, isBoss: false,
    },
    { // Levels 7-13 – Hard
        ammoMax: 4, reloadFrames: 240,
        devilHp: 10, devilR: 28, devilSpeed: 1.2, devilShootRate: 140, devilShotsPerFire: 1,
        extraFireMonsters: 1, extraGhosts: 1,
        coinCount: 8, isBoss: false,
    },
    { // Levels 14-20 – BOSS
        ammoMax: 4, reloadFrames: 270,
        devilHp: 20, devilR: 52, devilSpeed: 1.4, devilShootRate: 100, devilShotsPerFire: 3,
        extraFireMonsters: 2, extraGhosts: 2,
        coinCount: 10, isBoss: true,
    },
];
const CAVE_MAX_FRAMES = 180;   // 3 seconds at 60 fps — same for all levels

function getLevelCfg() {
    if (state.currentLevel <= 6)  return LEVEL_CONFIGS[0];
    if (state.currentLevel <= 13) return LEVEL_CONFIGS[1];
    return LEVEL_CONFIGS[2];
}

// ── AVATAR SKINS ─────────────────────────────────────────────
const AVATAR_COLORS      = ['#FFFFFF', '#4488FF', '#44FF66', '#FF4422', '#FFD700'];
const AVATAR_NAMES       = ['White', 'Blue', 'Green', 'Red', 'Gold'];
const AVATAR_UNLOCK_COST = [0, 5, 10, 15, 20];  // coins needed to unlock each skin

// Five enemy visual styles the player picks before each level
const ENEMY_SKINS = [
    { id: 0, name: 'Fire Imp',     type: 'fire',    color: '#FF6600', glowColor: '#FF4400', accent: '#FFAA00', particleColor: '#FF6600' },
    { id: 1, name: 'Void Ghost',   type: 'ghost',   color: '#CC88FF', glowColor: '#AA44FF', accent: '#EE99FF', particleColor: '#CC88FF' },
    { id: 2, name: 'Shadow Demon', type: 'shadow',  color: '#8844FF', glowColor: '#440099', accent: '#CCAAFF', particleColor: '#8844FF' },
    { id: 3, name: 'Ice Wraith',   type: 'crystal', color: '#88DDFF', glowColor: '#3388CC', accent: '#CCFFFF', particleColor: '#88DDFF' },
    { id: 4, name: 'Poison Slime', type: 'slime',   color: '#44CC44', glowColor: '#228822', accent: '#AAFFAA', particleColor: '#44CC44' },
];

// Player skins – index 0 is the default; 1-4 are unlocked at level 5/10/15/20
const PLAYER_SKINS = [
    { name: 'Hero',           baseColor: '#FFFFFF', eyeColor: '#000000', glowColor: '#FFFFFF' },
    { name: 'Golden Warrior', baseColor: '#FFD700', eyeColor: '#000000', glowColor: '#FFAA00' },
    { name: 'Crystal Knight', baseColor: '#88DDFF', eyeColor: '#004466', glowColor: '#44AAFF' },
    { name: 'Shadow Mage',    baseColor: '#BB44FF', eyeColor: '#FF88FF', glowColor: '#9900CC' },
    { name: 'Celestial',      baseColor: '#FFE566', eyeColor: '#FFFFFF', glowColor: '#FFD700' },
];

// ── HELL CAVES (player can hide here; devil switches to WANDER) ──
const HELL_CAVES = [
    { x: 55,  y: 55,  w: 175, h: 115 },
    { x: 570, y: 400, w: 175, h: 130 },
];

// ── STATE ────────────────────────────────────────────────────
let state = {
    room:               ROOM.VOID,
    lightCrystals:      0,
    power:              POWER.NONE,
    won:                false,
    screenShake:        0,
    playerFlash:        0,
    gamePhase:          'intro',   // 'intro' | 'playing' | 'prelevel' | 'leveldone' | 'skinunlock'
    playerHp:           5,
    playerInvincible:   0,
    confettiSpawned:    false,
    paradiseClearCount: 0,         // how many crystals collected (0–3)
    voidHealTimer:      0,         // counts frames toward next +1 HP heal in Void
    currentLevel:        1,
    selectedEnemySkin:   0,
    unlockedPlayerSkins: [0],
    selectedPlayerSkin:  0,
    preLevelHighlight:   -1,
    skinSelectHighlight: -1,
    // Ammo
    ammo:               5,
    ammoMax:            5,
    ammoReloading:      false,
    ammoReloadTimer:    0,
    // Cave timer
    caveTimer:          0,
    caveProtectionExpired: false,
    // Coins & shop
    coins:              0,
    shopOpen:           false,
    unlockedSkins:      [true, ...Array(AVATAR_COLORS.length - 1).fill(false)],
    activeSkin:         0,
};

// ── PLAYER ───────────────────────────────────────────────────
const player = { x: 400, y: 300, w: 32, h: 32 };

// ── INPUT ────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        e.preventDefault();
        if (state.gamePhase === 'intro') {
            state.gamePhase = 'playing';
        } else if (state.gamePhase === 'prelevel') {
            levelEnemies = makeLevelEnemies();
            state.gamePhase = 'playing';
        } else if (state.gamePhase === 'leveldone') {
            advanceLevel();
        } else if (state.gamePhase === 'skinunlock') {
            const newIdx = getUnlockedSkinIndex();
            state.selectedPlayerSkin = newIdx;
            advanceToNextLevel();
        } else {
            shoot();
        }
    }
    // Cycle player skins on pre-level screen with arrow keys
    if (state.gamePhase === 'prelevel') {
        if ((e.code === 'ArrowLeft' || e.code === 'KeyA') && state.unlockedPlayerSkins.length > 1) {
            const cur = state.unlockedPlayerSkins.indexOf(state.selectedPlayerSkin);
            state.selectedPlayerSkin = state.unlockedPlayerSkins[(cur - 1 + state.unlockedPlayerSkins.length) % state.unlockedPlayerSkins.length];
        }
        if ((e.code === 'ArrowRight' || e.code === 'KeyD') && state.unlockedPlayerSkins.length > 1) {
            const cur = state.unlockedPlayerSkins.indexOf(state.selectedPlayerSkin);
            state.selectedPlayerSkin = state.unlockedPlayerSkins[(cur + 1) % state.unlockedPlayerSkins.length];
        }
    }
    // Shop toggle (E key, only in Void)
    if (e.code === 'KeyE' && state.gamePhase === 'playing'
        && state.room === ROOM.VOID && !state.won) {
        state.shopOpen = !state.shopOpen;
    }
    // Number keys 1-5: equip / unlock skins in shop
    const skinKey = { Digit1: 0, Digit2: 1, Digit3: 2, Digit4: 3, Digit5: 4 };
    if (e.code in skinKey && state.shopOpen) {
        const idx = skinKey[e.code];
        if (state.unlockedSkins[idx]) {
            state.activeSkin = idx;
        } else if (state.coins >= AVATAR_UNLOCK_COST[idx]) {
            state.coins -= AVATAR_UNLOCK_COST[idx];
            state.unlockedSkins[idx] = true;
            state.activeSkin = idx;
            spawnParticles(player.x, player.y, AVATAR_COLORS[idx], 8);
        }
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (800 / rect.width);
    const my = (e.clientY - rect.top)  * (600 / rect.height);

    if (state.won) {
        if (mx >= 300 && mx <= 500 && my >= 420 && my <= 475) resetGame();
        return;
    }

    if (state.gamePhase === 'prelevel') {
        // Check skin choice buttons
        const btnW = 120, btnH = 150, gap = 16;
        const totalW = 5 * btnW + 4 * gap;
        const startX = (800 - totalW) / 2;
        const btnY = 130;
        for (let idx = 0; idx < 5; idx++) {
            const bx = startX + idx * (btnW + gap);
            if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
                state.selectedEnemySkin = idx;
                return;
            }
        }
        // Start Level button
        if (mx >= 300 && mx <= 500 && my >= 348 && my <= 400) {
            levelEnemies = makeLevelEnemies();
            state.gamePhase = 'playing';
        }
    }

    if (state.gamePhase === 'leveldone') {
        if (mx >= 300 && mx <= 500 && my >= 390 && my <= 442) {
            advanceLevel();
        }
    }

    if (state.gamePhase === 'skinunlock') {
        const newIdx = getUnlockedSkinIndex();
        // EQUIP NEW SKIN button: x=230, y=450, w=160, h=46
        if (mx >= 230 && mx <= 390 && my >= 450 && my <= 496) {
            state.selectedPlayerSkin = newIdx;
            advanceToNextLevel();
        }
        // KEEP CURRENT button: x=410, y=450, w=160, h=46
        if (mx >= 410 && mx <= 570 && my >= 450 && my <= 496) {
            advanceToNextLevel();
        }
    }
});

// ── VIRTUAL TOUCH CONTROLS ────────────────────────────────────
let isTouchDevice = false;
const VJOY   = { x: 100, y: 490, baseR: 55, maxDist: 40 };
const VSHOOT = { x: 700, y: 490, r: 45 };
const TOUCH_AREA_MULTIPLIER  = 1.5;  // expand tap hit area beyond visible radius
const JOYSTICK_DEADZONE_RATIO = 0.2; // fraction of maxDist before movement starts
const vTouch = { joyId: null, joyDX: 0, joyDY: 0, joyOriX: 0, joyOriY: 0, shootId: null };

function canvasPos(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (clientX - rect.left) * (canvas.width  / rect.width),
        y: (clientY - rect.top)  * (canvas.height / rect.height),
    };
}

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    isTouchDevice = true;
    for (const t of e.changedTouches) {
        const p = canvasPos(t.clientX, t.clientY);
        if (state.gamePhase === 'intro') {
            state.gamePhase = 'playing';
        } else if (state.gamePhase === 'prelevel') {
            // Skin selection
            const btnW = 120, btnH = 150, gap = 16;
            const totalW = 5 * btnW + 4 * gap;
            const startX = (800 - totalW) / 2;
            const btnY = 130;
            for (let idx = 0; idx < 5; idx++) {
                const bx = startX + idx * (btnW + gap);
                if (p.x >= bx && p.x <= bx + btnW && p.y >= btnY && p.y <= btnY + btnH) {
                    state.selectedEnemySkin = idx;
                    break;
                }
            }
            if (p.x >= 300 && p.x <= 500 && p.y >= 348 && p.y <= 400) {
                levelEnemies = makeLevelEnemies();
                state.gamePhase = 'playing';
            }
        } else if (state.gamePhase === 'leveldone') {
            if (p.x >= 300 && p.x <= 500 && p.y >= 390 && p.y <= 442) {
                advanceLevel();
            }
        } else if (state.gamePhase === 'skinunlock') {
            const newIdx = getUnlockedSkinIndex();
            if (p.x >= 230 && p.x <= 390 && p.y >= 450 && p.y <= 496) {
                state.selectedPlayerSkin = newIdx;
                advanceToNextLevel();
            }
            if (p.x >= 410 && p.x <= 570 && p.y >= 450 && p.y <= 496) {
                advanceToNextLevel();
            }
        }
        if (state.won && p.x >= 300 && p.x <= 500 && p.y >= 420 && p.y <= 475) {
            resetGame();
        }
        if (vTouch.joyId === null && Math.hypot(p.x - VJOY.x, p.y - VJOY.y) < VJOY.baseR * TOUCH_AREA_MULTIPLIER) {
            vTouch.joyId = t.identifier; vTouch.joyOriX = p.x; vTouch.joyOriY = p.y;
            vTouch.joyDX = 0; vTouch.joyDY = 0;
        } else if (vTouch.shootId === null && Math.hypot(p.x - VSHOOT.x, p.y - VSHOOT.y) < VSHOOT.r * TOUCH_AREA_MULTIPLIER) {
            vTouch.shootId = t.identifier;
            shoot();
        }
    }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (t.identifier !== vTouch.joyId) continue;
        const p = canvasPos(t.clientX, t.clientY);
        const rawDX = p.x - vTouch.joyOriX, rawDY = p.y - vTouch.joyOriY;
        const dist = Math.hypot(rawDX, rawDY);
        const clamped = Math.min(dist, VJOY.maxDist);
        vTouch.joyDX = dist > 0 ? (rawDX / dist) * clamped : 0;
        vTouch.joyDY = dist > 0 ? (rawDY / dist) * clamped : 0;
    }
}, { passive: false });

function clearTouchId(id) {
    if (id === vTouch.joyId)   { vTouch.joyId = null; vTouch.joyDX = 0; vTouch.joyDY = 0; }
    if (id === vTouch.shootId) { vTouch.shootId = null; }
}
canvas.addEventListener('touchend',    e => { e.preventDefault(); for (const t of e.changedTouches) clearTouchId(t.identifier); }, { passive: false });
canvas.addEventListener('touchcancel', e => { e.preventDefault(); for (const t of e.changedTouches) clearTouchId(t.identifier); }, { passive: false });

canvas.addEventListener('mousemove', e => {
    if (state.gamePhase !== 'prelevel') return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (800 / rect.width);
    const my = (e.clientY - rect.top)  * (600 / rect.height);
    const btnW = 120, btnH = 150, gap = 16;
    const totalW = 5 * btnW + 4 * gap;
    const startX = (800 - totalW) / 2;
    const btnY = 130;
    state.preLevelHighlight = -1;
    for (let idx = 0; idx < 5; idx++) {
        const bx = startX + idx * (btnW + gap);
        if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
            state.preLevelHighlight = idx;
            break;
        }
    }
});

// ── ENTITY FACTORIES ─────────────────────────────────────────
function makeCoins(count) {
    const list = [];
    for (let i = 0; i < count; i++) {
        list.push({ x: 80 + Math.random() * 640, y: 80 + Math.random() * 440, picked: false });
    }
    return list;
}

function makeHell() {
    const cfg = getLevelCfg();
    return {
        iceCrystals: [
            { x: 150, y: 200, picked: false },
            { x: 300, y: 450, picked: false },
        ],
        brimstones: [
            { x: 580, y: 150, picked: false },
            { x: 480, y: 370, picked: false },
        ],
        devil: {
            x: 660, y: 300, r: cfg.devilR, alive: true, shieldFlash: 0,
            hp: cfg.devilHp, maxHp: cfg.devilHp,
            aiState: 'CHASE',
            wanderTarget: { x: 400, y: 300 },
            wanderWaitTimer: 0,
            shootTimer: cfg.devilShootRate,
            telegraphTimer: 0,
            isAboutToShoot: false,
        },
        coins: makeCoins(cfg.coinCount),
    };
}

function makeParadise() {
    const cfg = getLevelCfg();
    const baseFireMonsters = [
        { x: 200, y: 150, r: 16, alive: true, dx: 1.2,  dy: 0.8  },
        { x: 550, y: 200, r: 16, alive: true, dx: -0.9, dy: 1.1  },
        { x: 350, y: 400, r: 16, alive: true, dx: 1.0,  dy: -1.0 },
    ];
    const baseGhosts = [
        { x: 300, y: 250, r: 16, alive: true, dx: -0.7, dy: 0.9  },
        { x: 600, y: 350, r: 16, alive: true, dx: 0.8,  dy: -0.8 },
    ];
    // Extra enemies for harder levels
    for (let i = 0; i < cfg.extraFireMonsters; i++) {
        baseFireMonsters.push({ x: 150 + i * 200, y: 100 + i * 80, r: 16, alive: true, dx: 1.1 + i * 0.2, dy: -0.9 - i * 0.15 });
    }
    for (let i = 0; i < cfg.extraGhosts; i++) {
        baseGhosts.push({ x: 450 + i * 150, y: 150 + i * 100, r: 16, alive: true, dx: -0.8 - i * 0.2, dy: 1.0 + i * 0.2 });
    }
    return {
        fireMonsters: baseFireMonsters,
        ghosts:       baseGhosts,
        chests: [
            { x: 200, y: 480, w: 30, h: 24, opened: false },
            { x: 400, y: 480, w: 30, h: 24, opened: false },
            { x: 600, y: 480, w: 30, h: 24, opened: false },
        ],
        waveReset: false,   // true → respawn enemies on next paradise entry
        coins: makeCoins(cfg.coinCount),
    };
}

function makeVoidRoom() {
    return {
        enemies: [],
        coins:   makeCoins(4),
    };
}

function makeLevelEnemies() {
    const lvl  = state.currentLevel;
    const skin = ENEMY_SKINS[state.selectedEnemySkin];
    const count     = 2 + Math.floor((lvl - 1) / 3);                     // 2 → 8
    const speed     = 0.7 + (lvl - 1) * 0.08;                            // 0.70 → 2.22
    const shootRate = Math.max(50, 180 - (lvl - 1) * 8);                  // 180 → 50
    const r         = 14 + Math.min(6, Math.floor((lvl - 1) / 4));        // 14 → 20
    const enemies   = [];
    for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        enemies.push({
            x: 400 + Math.cos(a) * 220,
            y: 300 + Math.sin(a) * 180,
            r,
            alive: true,
            dx: Math.cos(a + Math.PI / 2) * speed * (0.8 + Math.random() * 0.4),
            dy: Math.sin(a + Math.PI / 2) * speed * (0.8 + Math.random() * 0.4),
            shootTimer: Math.floor(shootRate * (0.5 + Math.random() * 0.8)),
            skin,
        });
    }
    return enemies;
}

let hell      = makeHell();
let paradise  = makeParadise();
let voidRoom  = makeVoidRoom();
let levelEnemies = [];

// ── PORTALS ───────────────────────────────────────────────────
const PORTALS = {
    void:     [
        { x: 30,  y: 260, w: 32, h: 80, dest: ROOM.HELL,    color: '#CC2200', label: 'HELL'     },
        { x: 738, y: 260, w: 32, h: 80, dest: ROOM.PARADISE, color: '#FFD700', label: 'PARADISE' },
    ],
    hell:     [{ x: 738, y: 260, w: 32, h: 80, dest: ROOM.VOID, color: '#888888', label: 'VOID' }],
    paradise: [{ x: 30,  y: 260, w: 32, h: 80, dest: ROOM.VOID, color: '#888888', label: 'VOID' }],
};

// ── DYNAMIC LISTS ─────────────────────────────────────────────
let projectiles      = [];
let enemyProjectiles = [];
let particles        = [];

// ── HELPERS ───────────────────────────────────────────────────
function triggerShake(amount = 12) { state.screenShake = amount; }

function spawnParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
        const a = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        particles.push({
            x, y,
            dx: Math.cos(a) * (2 + Math.random() * 3),
            dy: Math.sin(a) * (2 + Math.random() * 3),
            life: 35, maxLife: 35,
            color, r: 4 + Math.random() * 4,
        });
    }
}

function spawnConfetti() {
    const colors = ['#FF4444','#FF8800','#FFFF00','#44FF44','#4488FF','#CC44FF','#FF44CC','#FFFFFF','#FF88AA'];
    for (let i = 0; i < 130; i++) {
        const a   = Math.random() * Math.PI * 2;
        const spd = 3 + Math.random() * 9;
        particles.push({
            x: 400, y: 300,
            dx: Math.cos(a) * spd,
            dy: Math.sin(a) * spd - 2,
            life: 90 + Math.random() * 70, maxLife: 160,
            color: colors[Math.floor(Math.random() * colors.length)],
            r: 0,
            confetti: true,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.18,
            cw: 7 + Math.random() * 6,
            ch: 4 + Math.random() * 4,
        });
    }
}

function isPlayerInCave() {
    if (state.room !== ROOM.HELL) return false;
    if (state.caveProtectionExpired) return false;
    return HELL_CAVES.some(c =>
        player.x >= c.x && player.x <= c.x + c.w &&
        player.y >= c.y && player.y <= c.y + c.h
    );
}

function isPlayerPhysicallyInCave() {
    if (state.room !== ROOM.HELL) return false;
    return HELL_CAVES.some(c =>
        player.x >= c.x && player.x <= c.x + c.w &&
        player.y >= c.y && player.y <= c.y + c.h
    );
}

function allMonstersDefeated() {
    if (state.room === ROOM.PARADISE) {
        return levelEnemies.length > 0 && levelEnemies.every(e => !e.alive);
    }
    return paradise.fireMonsters.every(e => !e.alive)
        && paradise.ghosts.every(e => !e.alive);
}

function getPlayerColor() {
    if (state.playerFlash > 0) return '#FFFF00';
    if (state.power === POWER.ICE)       return '#4488FF';
    if (state.power === POWER.BRIMSTONE) return '#FF4422';
    return PLAYER_SKINS[state.selectedPlayerSkin].baseColor;
}

function damagePlayer() {
    if (state.playerInvincible > 0) return;
    state.playerHp--;
    state.playerInvincible = 90;
    triggerShake(14);
    spawnParticles(player.x, player.y, '#FF4444', 8);
    if (state.playerHp <= 0) respawnPlayer();
}

function respawnPlayer() {
    state.power           = POWER.NONE;
    state.playerHp        = 5;
    state.playerInvincible = 120;
    changeRoom(ROOM.VOID);
}

function resetGame() {
    const cfg = LEVEL_CONFIGS[0];
    Object.assign(state, {
        room: ROOM.VOID, lightCrystals: 0, power: POWER.NONE,
        won: false, screenShake: 0, playerFlash: 0,
        gamePhase: 'intro', playerHp: 5, playerInvincible: 0,
        confettiSpawned: false, paradiseClearCount: 0, voidHealTimer: 0,
        currentLevel: 1, selectedEnemySkin: 0, unlockedPlayerSkins: [0],
        selectedPlayerSkin: 0, preLevelHighlight: -1, skinSelectHighlight: -1,
        ammo: cfg.ammoMax, ammoMax: cfg.ammoMax, ammoReloading: false, ammoReloadTimer: 0,
        caveTimer: 0, caveProtectionExpired: false,
        coins: 0, shopOpen: false,
        unlockedSkins: [true, ...Array(AVATAR_COLORS.length - 1).fill(false)], activeSkin: 0,
    });
    player.x = 400; player.y = 300;
    hell             = makeHell();
    paradise         = makeParadise();
    voidRoom         = makeVoidRoom();
    projectiles      = [];
    enemyProjectiles = [];
    particles        = [];
    levelEnemies     = [];
}

// ── ROOM CHANGE ───────────────────────────────────────────────
function respawnParadiseWave() {
    paradise.fireMonsters.forEach((e, i) => {
        e.alive = true;
        e.x = [200, 550, 350][i]; e.y = [150, 200, 400][i];
        e.dx = [1.2, -0.9, 1.0][i]; e.dy = [0.8, 1.1, -1.0][i];
    });
    paradise.ghosts.forEach((e, i) => {
        e.alive = true;
        e.x = [300, 600][i]; e.y = [250, 350][i];
        e.dx = [-0.7, 0.8][i]; e.dy = [0.9, -0.8][i];
    });
}

function changeRoom(dest) {
    state.room = dest;
    state.shopOpen = false;   // close shop when changing rooms
    projectiles      = [];
    enemyProjectiles = [];
    if (dest === ROOM.VOID)     { player.x = 400; player.y = 300; }
    if (dest === ROOM.HELL)     {
        player.x = 100; player.y = 300;
        // Crystals reappear fresh each visit
        hell.iceCrystals.forEach(c => { c.picked = false; });
        hell.brimstones.forEach(b => { b.picked = false; });
    }
    if (dest === ROOM.PARADISE) {
        player.x = 400; player.y = 300;
        levelEnemies = [];
        state.gamePhase = 'prelevel';
        state.preLevelHighlight = -1;
    }
}

// ── UPDATE: PLAYER ────────────────────────────────────────────
function updatePlayer() {
    if (state.won || state.gamePhase !== 'playing') return;

    const spd = state.room === ROOM.PARADISE ? BASE_SPEED * 1.2 : BASE_SPEED;
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['KeyA']) dx -= spd;
    if (keys['ArrowRight'] || keys['KeyD']) dx += spd;
    if (keys['ArrowUp']    || keys['KeyW']) dy -= spd;
    if (keys['ArrowDown']  || keys['KeyS']) dy += spd;
    // Virtual joystick
    const deadzone = VJOY.maxDist * JOYSTICK_DEADZONE_RATIO;
    if (vTouch.joyDX < -deadzone) dx -= spd;
    if (vTouch.joyDX >  deadzone) dx += spd;
    if (vTouch.joyDY < -deadzone) dy -= spd;
    if (vTouch.joyDY >  deadzone) dy += spd;
    if (dx && dy) { dx *= 0.707; dy *= 0.707; }

    player.x = Math.max(18, Math.min(canvas.width  - 18, player.x + dx));
    player.y = Math.max(52, Math.min(canvas.height - 18, player.y + dy));

    for (const p of PORTALS[state.room]) {
        if (player.x > p.x && player.x < p.x + p.w &&
            player.y > p.y && player.y < p.y + p.h) {
            changeRoom(p.dest);
            return;
        }
    }

    if (state.playerFlash     > 0) state.playerFlash--;
    if (state.playerInvincible > 0) state.playerInvincible--;

    // ── CAVE TIMER ─────────────────────────────────────────────
    if (isPlayerPhysicallyInCave()) {
        state.caveTimer++;
        if (state.caveTimer >= CAVE_MAX_FRAMES) {
            state.caveProtectionExpired = true;
        }
    } else {
        // Reset when player leaves the cave
        if (state.caveTimer > 0) {
            state.caveTimer = 0;
            state.caveProtectionExpired = false;
        }
    }

    // Brimstone spark trail
    if (state.power === POWER.BRIMSTONE && Math.random() < 0.5) {
        particles.push({
            x: player.x + (Math.random() - 0.5) * 14,
            y: player.y + (Math.random() - 0.5) * 14,
            dx: (Math.random() - 0.5) * 1.5,
            dy: (Math.random() - 0.5) * 1.5,
            life: 14, maxLife: 14,
            color: Math.random() < 0.5 ? '#FF4422' : '#FF8800',
            r: 2 + Math.random() * 2,
        });
    }
}

// ── UPDATE: ENEMIES ───────────────────────────────────────────
// Shield logic: ICE power blocks fire-type attacks; BRIMSTONE blocks ghost-type attacks
function isShieldedAgainst(enemyType) {
    if (enemyType === 'fire'  && state.power === POWER.ICE)       return true;
    if (enemyType === 'ghost' && state.power === POWER.BRIMSTONE) return true;
    return false;
}

function updateEnemies() {
    if (state.won) return;

    // ── VOID enemies ──────────────────────────────────────────
    if (state.room === ROOM.VOID) {
        for (const e of voidRoom.enemies) {
            e.x += e.dx; e.y += e.dy;
            if (e.x < 60 || e.x > 740) e.dx *= -1;
            if (e.y < 60 || e.y > 540) e.dy *= -1;
            // Contact damage (shielded by matching power)
            if (state.playerInvincible === 0 && !isShieldedAgainst(e.type) &&
                Math.hypot(e.x - player.x, e.y - player.y) < e.r + 16) {
                damagePlayer();
            }
            // Shoot at player periodically
            e.shootTimer--;
            if (e.shootTimer <= 0) {
                e.shootTimer = 100 + Math.floor(Math.random() * 60);
                const a = Math.atan2(player.y - e.y, player.x - e.x);
                enemyProjectiles.push({
                    x: e.x, y: e.y,
                    dx: Math.cos(a) * 3.5, dy: Math.sin(a) * 3.5,
                    color: e.type === 'fire' ? '#FF6600' : '#CC88FF',
                    life: 140, r: 6,
                    enemyType: e.type,
                });
            }
        }
    }

    if (state.room === ROOM.PARADISE && state.gamePhase === 'playing') {
        for (const e of levelEnemies) {
            if (!e.alive) continue;
            e.x += e.dx; e.y += e.dy;
            if (e.x < 60 || e.x > 740) e.dx *= -1;
            if (e.y < 60 || e.y > 540) e.dy *= -1;
            if (state.playerInvincible === 0 &&
                Math.hypot(e.x - player.x, e.y - player.y) < e.r + 16) {
                damagePlayer();
            }
            e.shootTimer--;
            if (e.shootTimer <= 0) {
                const shootRate = Math.max(50, 180 - (state.currentLevel - 1) * 8);
                e.shootTimer = Math.floor(shootRate * (0.5 + Math.random() * 0.8));
                const a = Math.atan2(player.y - e.y, player.x - e.x);
                enemyProjectiles.push({
                    x: e.x, y: e.y,
                    dx: Math.cos(a) * (3 + state.currentLevel * 0.1),
                    dy: Math.sin(a) * (3 + state.currentLevel * 0.1),
                    color: e.skin.color, life: 140, r: 6,
                    enemyType: e.skin.type,
                });
            }
        }
    }

    if (state.room === ROOM.HELL) {
        const d = hell.devil;
        if (!d.alive) return;
        if (d.shieldFlash > 0) d.shieldFlash--;

        const cfg = getLevelCfg();

        if (d.telegraphTimer > 0) {
            // Frozen while telegraphing
            d.telegraphTimer--;
            if (d.telegraphTimer === 0 && d.isAboutToShoot) {
                // Only fire if the player is still visible (not hiding in a cave)
                if (!isPlayerInCave()) {
                    const a = Math.atan2(player.y - d.y, player.x - d.x);
                    const shotsPerFire = cfg.devilShotsPerFire;
                    const spreadAngle = shotsPerFire > 1 ? 0.25 : 0;
                    for (let s = 0; s < shotsPerFire; s++) {
                        const offset = shotsPerFire > 1 ? (s - (shotsPerFire - 1) / 2) * spreadAngle : 0;
                        enemyProjectiles.push({
                            x: d.x, y: d.y,
                            dx: Math.cos(a + offset) * 5, dy: Math.sin(a + offset) * 5,
                            color: '#FF6600', life: 130, r: cfg.isBoss ? 9 : 7,
                        });
                    }
                }
                d.isAboutToShoot = false;
            }
        } else {
            const inCave = isPlayerInCave();

            if (inCave) {
                d.aiState = 'WANDER';
                if (d.wanderWaitTimer > 0) {
                    d.wanderWaitTimer--;
                } else {
                    const dist = Math.hypot(d.wanderTarget.x - d.x, d.wanderTarget.y - d.y);
                    if (dist < 14) {
                        // Arrived — telegraph, then pick new spot after wait
                        d.telegraphTimer  = 30;
                        d.wanderWaitTimer = 120; // 2 s
                        d.wanderTarget = {
                            x: 80 + Math.random() * 640,
                            y: 80 + Math.random() * 440,
                        };
                    } else {
                        const a = Math.atan2(d.wanderTarget.y - d.y, d.wanderTarget.x - d.x);
                        d.x = Math.max(50, Math.min(750, d.x + Math.cos(a) * 1.6));
                        d.y = Math.max(50, Math.min(550, d.y + Math.sin(a) * 1.6));
                    }
                }
            } else {
                d.aiState = 'CHASE';
                const a = Math.atan2(player.y - d.y, player.x - d.x);
                d.x = Math.max(60, Math.min(740, d.x + Math.cos(a) * cfg.devilSpeed));
                d.y = Math.max(60, Math.min(540, d.y + Math.sin(a) * cfg.devilSpeed));
                if (state.playerInvincible === 0 &&
                    Math.hypot(d.x - player.x, d.y - player.y) < d.r + 16) {
                    damagePlayer();
                }

                // Periodic shooting — only while player is visible (CHASE mode)
                d.shootTimer--;
                if (d.shootTimer <= 0) {
                    d.shootTimer     = cfg.devilShootRate;
                    d.telegraphTimer = 30;
                    d.isAboutToShoot = true;
                }
            }
        }
    }
}

// ── UPDATE: ENEMY PROJECTILES ─────────────────────────────────
function updateEnemyProjectiles() {
    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        const p = enemyProjectiles[i];
        p.x += p.dx; p.y += p.dy;
        p.life--;
        if (p.life <= 0 || p.x < 0 || p.x > 800 || p.y < 0 || p.y > 600) {
            enemyProjectiles.splice(i, 1); continue;
        }
        if (Math.hypot(p.x - player.x, p.y - player.y) < p.r + 16) {
            if (!isShieldedAgainst(p.enemyType)) {
                if (state.playerInvincible === 0) damagePlayer();
            }
            // Blocked projectiles vanish with a small spark
            spawnParticles(p.x, p.y, p.color, 4);
            enemyProjectiles.splice(i, 1);
        }
    }
}

// ── UPDATE: SHOOTING ──────────────────────────────────────────
function shoot() {
    if (state.won || state.gamePhase !== 'playing' || state.room === ROOM.VOID) return;
    if (state.room !== ROOM.PARADISE && state.power === POWER.NONE) return;
    if (state.ammoReloading || state.ammo <= 0) return;

    const enemies = [];
    if (state.room === ROOM.PARADISE) {
        levelEnemies.filter(e => e.alive).forEach(e => enemies.push(e));
    }
    if (state.room === ROOM.HELL && hell.devil.alive) enemies.push(hell.devil);
    if (!enemies.length) return;

    const target = enemies.reduce((best, e) => {
        const d = Math.hypot(e.x - player.x, e.y - player.y);
        return d < best.dist ? { en: e, dist: d } : best;
    }, { en: null, dist: Infinity }).en;

    if (!target) return;
    const a = Math.atan2(target.y - player.y, target.x - player.x);
    const color = state.power === POWER.ICE ? '#4488FF' : (state.power === POWER.BRIMSTONE ? '#FF4422' : '#FFFFFF');
    projectiles.push({ x: player.x, y: player.y, dx: Math.cos(a) * 9, dy: Math.sin(a) * 9,
        color, power: state.power, life: 90, r: 6 });

    state.ammo--;
    if (state.ammo <= 0) {
        state.ammoReloading = true;
        state.ammoReloadTimer = getLevelCfg().reloadFrames;
    }
}

// ── UPDATE: AMMO RELOAD ───────────────────────────────────────
function updateAmmo() {
    if (!state.ammoReloading) return;
    state.ammoReloadTimer--;
    if (state.ammoReloadTimer <= 0) {
        state.ammoReloading  = false;
        state.ammo           = state.ammoMax;
    }
}

// ── UPDATE: PROJECTILES & HITS ────────────────────────────────
function updateProjectiles() {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.dx; p.y += p.dy;
        p.life--;
        if (p.life <= 0 || p.x < 0 || p.x > 800 || p.y < 0 || p.y > 600) {
            projectiles.splice(i, 1); continue;
        }

        let hit = false;

        if (state.room === ROOM.PARADISE) {
            for (const e of levelEnemies) {
                if (!e.alive) continue;
                if (Math.hypot(p.x - e.x, p.y - e.y) < e.r + p.r) {
                    e.alive = false;
                    spawnParticles(e.x, e.y, e.skin.particleColor);
                    triggerShake();
                    hit = true; break;
                }
            }
        }

        if (!hit && state.room === ROOM.HELL) {
            const d = hell.devil;
            if (d.alive && Math.hypot(p.x - d.x, p.y - d.y) < d.r + p.r) {
                if (state.lightCrystals >= 3) {
                    d.hp--;
                    d.shieldFlash = 15;
                    spawnParticles(d.x, d.y, '#FF4400', 8);
                    triggerShake(8);
                    if (d.hp <= 0) {
                        d.alive = false;
                        spawnParticles(d.x, d.y, '#880000', 20);
                        triggerShake(20);
                        state.won = true;
                    }
                } else {
                    d.shieldFlash = 25;
                    spawnParticles(d.x, d.y, '#FFFFFF', 6);
                    triggerShake(6);
                }
                hit = true;
            }
        }

        if (hit) projectiles.splice(i, 1);
    }
}

// ── UPDATE: PICKUPS ───────────────────────────────────────────
function checkPickups() {
    if (state.won) return;

    if (state.room === ROOM.HELL) {
        for (const c of hell.iceCrystals) {
            if (!c.picked && Math.hypot(player.x - c.x, player.y - c.y) < 26) {
                c.picked = true; state.power = POWER.ICE;
                state.playerFlash = 25; spawnParticles(c.x, c.y, '#4488FF');
            }
        }
        for (const b of hell.brimstones) {
            if (!b.picked && Math.hypot(player.x - b.x, player.y - b.y) < 26) {
                b.picked = true; state.power = POWER.BRIMSTONE;
                state.playerFlash = 25; spawnParticles(b.x, b.y, '#FF4422');
            }
        }
        // Coins in Hell
        for (const coin of hell.coins) {
            if (!coin.picked && Math.hypot(player.x - coin.x, player.y - coin.y) < 22) {
                coin.picked = true;
                collectCoin();
            }
        }
    }

    if (state.room === ROOM.PARADISE) {
        const idx = state.paradiseClearCount;
        if (idx < 3) {
            const c = paradise.chests[idx];
            if (!c.opened && c.visible &&
                Math.abs(player.x - c.x) < 28 && Math.abs(player.y - c.y) < 28) {
                c.opened = true;
                state.lightCrystals++;
                state.paradiseClearCount++;
                state.playerFlash = 35;
                triggerShake(14);
                spawnParticles(c.x, c.y, '#FFD700', 14);
                // Queue enemies to respawn next time player enters paradise
                if (state.paradiseClearCount < 3) paradise.waveReset = true;
            }
        }
        // Coins in Paradise
        for (const coin of paradise.coins) {
            if (!coin.picked && Math.hypot(player.x - coin.x, player.y - coin.y) < 22) {
                coin.picked = true;
                collectCoin();
            }
        }
    }

    if (state.room === ROOM.VOID) {
        // Coins in Void
        for (const coin of voidRoom.coins) {
            if (!coin.picked && Math.hypot(player.x - coin.x, player.y - coin.y) < 22) {
                coin.picked = true;
                collectCoin();
            }
        }
    }
}

function collectCoin() {
    state.coins++;
    spawnParticles(player.x, player.y, '#FFD700', 5);
}

// ── UPDATE: VOID HEALING ──────────────────────────────────────
function updateVoidHealing() {
    if (state.room !== ROOM.VOID || state.playerHp >= 5) {
        state.voidHealTimer = 0;
        return;
    }
    state.voidHealTimer++;
    if (state.voidHealTimer >= 300) {   // 300 frames ≈ 5 seconds at 60 fps
        state.playerHp = Math.min(5, state.playerHp + 1);
        state.voidHealTimer = 0;
        state.playerFlash = 25;
        spawnParticles(player.x, player.y, '#FFD700', 8);
    }
}

// ── CHECK LEVEL COMPLETE ──────────────────────────────────────
function checkLevelComplete() {
    if (state.room !== ROOM.PARADISE || state.gamePhase !== 'playing') return;
    if (!allMonstersDefeated()) return;

    if (state.currentLevel >= MAX_LEVELS) {
        // Final level done → win!
        state.won = true;
        return;
    }

    // Show level-done screen
    state.gamePhase = 'leveldone';
}

function getUnlockedSkinIndex() {
    return Math.floor(state.currentLevel / 5);
}

function advanceLevel() {
    if (state.currentLevel % 5 === 0) {
        // Unlock new skin
        const newSkinIdx = getUnlockedSkinIndex();
        if (!state.unlockedPlayerSkins.includes(newSkinIdx)) {
            state.unlockedPlayerSkins.push(newSkinIdx);
        }
        state.gamePhase = 'skinunlock';
    } else {
        advanceToNextLevel();
    }
}

function advanceToNextLevel() {
    state.currentLevel++;
    levelEnemies = [];
    state.gamePhase = 'prelevel';
    state.preLevelHighlight = -1;
    state.selectedEnemySkin = 0;
    // Restore some HP between levels
    state.playerHp = Math.min(state.playerHp + 1, 5);
    // Update ammo for new level difficulty
    const newCfg = getLevelCfg();
    state.ammo = newCfg.ammoMax;
    state.ammoMax = newCfg.ammoMax;
    state.ammoReloading = false;
    state.ammoReloadTimer = 0;
}

// ── UPDATE: PARTICLES ─────────────────────────────────────────
function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.dx; p.y  += p.dy;
        p.dx *= 0.92; p.dy *= 0.92;
        if (p.confetti) {
            p.dy       += 0.09;
            p.rotation += p.rotSpeed;
        }
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// ── DRAW HELPERS ──────────────────────────────────────────────
function drawStar(x, y, r, color) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const b = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
        ctx.lineTo(x + Math.cos(a) * r,          y + Math.sin(a) * r);
        ctx.lineTo(x + Math.cos(b) * (r * 0.4),  y + Math.sin(b) * (r * 0.4));
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function drawCoins(coinList) {
    const t = Date.now() / 300;
    for (const c of coinList) {
        if (c.picked) continue;
        ctx.save();
        ctx.fillStyle   = '#FFD700';
        ctx.shadowColor = '#FFAA00';
        ctx.shadowBlur  = 8 + Math.sin(t + c.x) * 4;
        ctx.beginPath();
        ctx.arc(c.x, c.y + Math.sin(t + c.x * 0.1) * 3, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFF8';
        ctx.beginPath();
        ctx.arc(c.x - 2, c.y - 2 + Math.sin(t + c.x * 0.1) * 3, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// ── DRAW: INTRO SCREEN ────────────────────────────────────────
function drawIntro() {
    ctx.fillStyle = '#080018';
    ctx.fillRect(0, 0, 800, 600);

    // Twinkling stars
    const t = Date.now() / 3000;
    for (let i = 0; i < 35; i++) {
        const sx = ((i * 137 + 50) % 760) + 20;
        const sy = ((i * 97  + 30) % 520) + 40;
        const al = 0.25 + 0.4 * Math.sin(t * 2.5 + i);
        ctx.fillStyle = `rgba(255,255,255,${al})`;
        ctx.fillRect(sx, sy, 2, 2);
    }

    // Title
    ctx.save();
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 30;
    ctx.fillStyle   = '#FFD700';
    ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
    ctx.fillText('The Light of Paradise', 400, 78);
    ctx.restore();

    // Story text
    const lines = [
        'The Devil stole the Golden Light',
        'and hid it in Paradise City!',
        '',
        'Go to Hell to get Magic Power.',
        'Use the Power to clear the City',
        'and find 3 Light Crystals.',
        '',
        'Collect them all to defeat the Devil',
        'and save the world!',
        'by Goldwinner games',
    ];
    ctx.font = '18px Arial'; ctx.textAlign = 'center';
    lines.forEach((line, i) => {
        ctx.fillStyle = line === '' ? 'transparent' : 'rgba(210,210,255,0.92)';
        ctx.fillText(line, 400, 138 + i * 34);
    });

    // Hint: Caves
    ctx.fillStyle = 'rgba(180,120,60,0.7)';
    ctx.font = '13px Arial';
    ctx.fillText('Tip: Hide inside Caves in Hell — the Devil will lose track of you!', 400, 460);

    // Pulsing Press Space
    const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 400);
    ctx.save();
    ctx.fillStyle   = `rgba(255,255,80,${pulse})`;
    ctx.shadowColor = '#FFFF00'; ctx.shadowBlur = 16 * pulse;
    ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Tap or Press SPACE to Begin!', 400, 508);
    ctx.restore();

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '11px Arial';
    ctx.fillText('Move: WASD / Arrows  |  Shoot nearest enemy: Spacebar  |  Walk into portals to travel', 400, 562);
}

// ── DRAW: PORTALS ─────────────────────────────────────────────
function drawPortals() {
    const t = Date.now() / 600;
    for (const p of PORTALS[state.room]) {
        ctx.save();
        ctx.shadowColor = p.color; ctx.shadowBlur = 20 + Math.sin(t) * 8;
        ctx.fillStyle   = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.restore();
        ctx.fillStyle = '#FFF';
        ctx.font      = 'bold 10px Arial'; ctx.textAlign = 'center';
        ctx.fillText(p.label, p.x + p.w / 2, p.y - 6);
    }
}

// ── DRAW: VOID ────────────────────────────────────────────────
function drawVoid() {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.font      = 'bold 26px Arial'; ctx.textAlign = 'center';
    ctx.fillText('~ THE VOID ~', 400, 295);
    ctx.font      = '14px Arial';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText('Enter a portal to begin your journey', 400, 328);

    // Shield hint
    if (state.power !== POWER.NONE) {
        const shielded = state.power === POWER.ICE ? 'FIRE' : 'GHOST';
        ctx.fillStyle = state.power === POWER.ICE ? 'rgba(80,160,255,0.75)' : 'rgba(255,100,60,0.75)';
        ctx.font = 'bold 12px Arial';
        ctx.fillText(`🛡 ${state.power.toUpperCase()} SHIELD active — blocks ${shielded} attacks`, 400, 360);
    }

    // Void enemies
    const t = Date.now() / 400;
    for (const e of voidRoom.enemies) {
        ctx.save();
        if (e.type === 'fire') {
            ctx.fillStyle = '#FF6600'; ctx.shadowColor = '#FF4400'; ctx.shadowBlur = 12;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FFAA00';
            for (let i = 0; i < 5; i++) {
                const a = (i / 5) * Math.PI * 2 + t;
                ctx.beginPath();
                ctx.arc(e.x + Math.cos(a) * e.r * 0.85, e.y + Math.sin(a) * e.r * 0.85, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        } else {
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = '#CC88FF'; ctx.shadowColor = '#AA44FF'; ctx.shadowBlur = 16;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, Math.PI, 0);
            ctx.lineTo(e.x + e.r,       e.y + e.r * 0.7);
            ctx.lineTo(e.x + e.r * 0.5, e.y + e.r * 0.25);
            ctx.lineTo(e.x,             e.y + e.r * 0.7);
            ctx.lineTo(e.x - e.r * 0.5, e.y + e.r * 0.25);
            ctx.lineTo(e.x - e.r,       e.y + e.r * 0.7);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#330055';
            ctx.beginPath();
            ctx.arc(e.x - 4, e.y - 2, 3, 0, Math.PI * 2);
            ctx.arc(e.x + 4, e.y - 2, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    // Coins
    drawCoins(voidRoom.coins);

    // Shop hint
    if (state.coins > 0) {
        ctx.fillStyle = 'rgba(255,215,0,0.55)';
        ctx.font = '12px Arial'; ctx.textAlign = 'center';
        ctx.fillText('Press E to open the Shop', 400, 410);
    }
}

// ── DRAW: HELL ────────────────────────────────────────────────
function drawHell() {
    const t = Date.now() / 500;

    // Caves
    for (const c of HELL_CAVES) {
        ctx.save();
        ctx.fillStyle   = 'rgba(15, 8, 4, 0.85)';
        ctx.strokeStyle = '#5a2800';
        ctx.lineWidth   = 3;
        const rad = 18;
        ctx.beginPath();
        ctx.moveTo(c.x + rad, c.y);
        ctx.arcTo(c.x + c.w, c.y,       c.x + c.w, c.y + c.h, rad);
        ctx.arcTo(c.x + c.w, c.y + c.h, c.x,       c.y + c.h, rad);
        ctx.arcTo(c.x,       c.y + c.h, c.x,       c.y,       rad);
        ctx.arcTo(c.x,       c.y,       c.x + c.w, c.y,       rad);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.fillStyle   = 'rgba(120,70,30,0.55)';
        ctx.font        = 'bold 11px Arial'; ctx.textAlign = 'center';
        ctx.fillText('CAVE  (hide here!)', c.x + c.w / 2, c.y + c.h / 2 + 4);
        ctx.restore();
    }

    // Ice Crystals
    for (const c of hell.iceCrystals) {
        if (c.picked) continue;
        drawStar(c.x, c.y + Math.sin(t + c.x) * 3, 12, '#4488FF');
        ctx.fillStyle = '#88BBFF'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
        ctx.fillText('ICE', c.x, c.y + 30);
    }

    // Brimstones
    for (const b of hell.brimstones) {
        if (b.picked) continue;
        drawStar(b.x, b.y + Math.sin(t + b.x) * 3, 12, '#FF4422');
        ctx.fillStyle = '#FF8866'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
        ctx.fillText('FIRE', b.x, b.y + 30);
    }

    // Devil
    const d = hell.devil;
    if (d.alive) {
        const telegraphing = d.telegraphTimer > 0;
        const flashOn      = telegraphing && Math.floor(Date.now() / 80) % 2 === 0;

        ctx.save();
        ctx.shadowColor = telegraphing ? '#FFFF00' : (d.shieldFlash > 0 ? '#FFFFFF' : '#FF0000');
        ctx.shadowBlur  = telegraphing ? 50 : (d.shieldFlash > 0 ? 40 : 20);

        // Body
        ctx.fillStyle = telegraphing ? (flashOn ? '#FFFF44' : '#FFFFFF')
                      : (d.shieldFlash > 0 ? '#FFFFFF' : '#880000');
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2); ctx.fill();

        // Horns
        ctx.fillStyle = telegraphing ? '#FFAA00' : (d.shieldFlash > 0 ? '#DDDDDD' : '#550000');
        [[d.x - 14, -1], [d.x + 14, 1]].forEach(([hx, dir]) => {
            ctx.beginPath();
            ctx.moveTo(hx, d.y - d.r + 2);
            ctx.lineTo(hx + dir * 6,  d.y - d.r - 20);
            ctx.lineTo(hx + dir * 14, d.y - d.r);
            ctx.fill();
        });

        // Eyes
        ctx.fillStyle = '#FFFF00';
        ctx.beginPath();
        ctx.arc(d.x - 9, d.y - 4, 6, 0, Math.PI * 2);
        ctx.arc(d.x + 9, d.y - 4, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(d.x - 9, d.y - 4, 3, 0, Math.PI * 2);
        ctx.arc(d.x + 9, d.y - 4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // State label
        ctx.fillStyle = 'rgba(255,120,120,0.65)';
        ctx.font = '10px Arial'; ctx.textAlign = 'center';
        ctx.fillText(d.aiState, d.x, d.y + d.r + 14);

        // HP bar (only shown when player has 3 crystals and can damage devil)
        if (state.lightCrystals >= 3) {
            const bw = 70, bh = 9;
            const bx = d.x - bw / 2, by = d.y - d.r - 30;
            ctx.fillStyle = '#400';
            ctx.fillRect(bx, by, bw, bh);
            ctx.fillStyle = `hsl(${(d.hp / d.maxHp) * 120}, 100%, 45%)`;
            ctx.fillRect(bx, by, bw * (d.hp / d.maxHp), bh);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            ctx.strokeRect(bx, by, bw, bh);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
            ctx.fillText(`${d.hp}/${d.maxHp}`, d.x, by + bh - 1);
        }

        // Crystal warning
        if (state.lightCrystals < 3 && d.shieldFlash > 0) {
            ctx.fillStyle = '#FFFF00';
            ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center';
            ctx.fillText('NEED ALL LIGHT CRYSTALS!', d.x, d.y - d.r - 14);
        }
    }

    // Coins
    drawCoins(hell.coins);

    // Cave timer warning
    if (isPlayerPhysicallyInCave() && state.caveTimer > 0) {
        const frac = state.caveTimer / CAVE_MAX_FRAMES;
        const secsLeft = Math.max(0, Math.ceil((CAVE_MAX_FRAMES - state.caveTimer) / 60));
        if (frac >= 0.5) {
            const flash = state.caveProtectionExpired ? (Math.floor(Date.now() / 200) % 2 === 0) : true;
            ctx.fillStyle = state.caveProtectionExpired
                ? `rgba(255,80,0,${flash ? 0.9 : 0.5})`
                : `rgba(255,220,50,${0.5 + frac * 0.5})`;
            ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
            ctx.fillText(
                state.caveProtectionExpired ? '⚠ CAVE EXPIRED — LEAVE NOW!' : `Cave protection: ${secsLeft}s left`,
                400, 535
            );
        }
    }
}

// ── DRAW: PARADISE ────────────────────────────────────────────
function drawParadise() {
    const t = Date.now() / 400;

    for (const e of levelEnemies) {
        if (!e.alive) continue;
        ctx.save();
        const sk = e.skin;

        if (sk.type === 'fire') {
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 12;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = sk.accent;
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2 + t;
                ctx.beginPath();
                ctx.arc(e.x + Math.cos(a) * e.r * 0.9, e.y + Math.sin(a) * e.r * 0.9, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (sk.type === 'ghost') {
            ctx.globalAlpha = 0.82;
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r, Math.PI, 0);
            ctx.lineTo(e.x + e.r,       e.y + e.r * 0.7);
            ctx.lineTo(e.x + e.r * 0.5, e.y + e.r * 0.25);
            ctx.lineTo(e.x,             e.y + e.r * 0.7);
            ctx.lineTo(e.x - e.r * 0.5, e.y + e.r * 0.25);
            ctx.lineTo(e.x - e.r,       e.y + e.r * 0.7);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#330055';
            ctx.beginPath();
            ctx.arc(e.x - 5, e.y - 3, 3.5, 0, Math.PI * 2);
            ctx.arc(e.x + 5, e.y - 3, 3.5, 0, Math.PI * 2);
            ctx.fill();
        } else if (sk.type === 'shadow') {
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 20;
            ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(t * 0.8);
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2;
                const rr = i % 2 === 0 ? e.r : e.r * 0.5;
                i === 0 ? ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr)
                        : ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
            }
            ctx.closePath(); ctx.fill();
            ctx.restore();
            ctx.fillStyle = sk.accent;
            ctx.beginPath();
            ctx.arc(e.x - 5, e.y - 3, 3, 0, Math.PI * 2);
            ctx.arc(e.x + 5, e.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        } else if (sk.type === 'crystal') {
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 16;
            ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(t * 0.5);
            ctx.beginPath();
            ctx.moveTo(0, -e.r);
            ctx.lineTo(e.r * 0.6, -e.r * 0.2);
            ctx.lineTo(e.r * 0.6,  e.r * 0.6);
            ctx.lineTo(0,          e.r);
            ctx.lineTo(-e.r * 0.6, e.r * 0.6);
            ctx.lineTo(-e.r * 0.6, -e.r * 0.2);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.45)';
            ctx.beginPath();
            ctx.moveTo(0, -e.r * 0.5);
            ctx.lineTo(e.r * 0.3, 0);
            ctx.lineTo(0, e.r * 0.5);
            ctx.lineTo(-e.r * 0.3, 0);
            ctx.closePath(); ctx.fill();
            ctx.restore();
        } else { // slime
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 10;
            ctx.beginPath();
            for (let i = 0; i <= 32; i++) {
                const a = (i / 32) * Math.PI * 2;
                const wobble = e.r + Math.sin(a * 4 + t * 3) * 3;
                i === 0 ? ctx.moveTo(e.x + Math.cos(a) * wobble, e.y + Math.sin(a) * wobble)
                        : ctx.lineTo(e.x + Math.cos(a) * wobble, e.y + Math.sin(a) * wobble);
            }
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = sk.accent;
            ctx.beginPath();
            ctx.arc(e.x - 4, e.y - 3, 3, 0, Math.PI * 2);
            ctx.arc(e.x + 4, e.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    }

    if (!allMonstersDefeated() && state.gamePhase === 'playing') {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '13px Arial'; ctx.textAlign = 'center';
        ctx.fillText(`Level ${state.currentLevel}/${MAX_LEVELS} — Defeat all enemies!`, 400, 544);
    }

    // Coins
    drawCoins(paradise.coins);
}

// ── DRAW: PLAYER ──────────────────────────────────────────────
function drawPlayer() {
    const t = Date.now() / 400;

    // Ice aura
    if (state.power === POWER.ICE) {
        const pulse = 30 + Math.sin(t * 3) * 5;
        const alpha = 0.28 + 0.18 * Math.sin(t * 3);
        ctx.save();
        ctx.beginPath();
        ctx.arc(player.x, player.y, pulse, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(100,180,255,${alpha})`;
        ctx.lineWidth   = 4;
        ctx.shadowColor = '#88CCFF'; ctx.shadowBlur = 14;
        ctx.stroke();
        ctx.restore();
    }

    // Void healing radiance (pulsing golden glow when HP is not full)
    if (state.room === ROOM.VOID && state.playerHp < 5) {
        const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
        const r = 28 + pulse * 10;
        ctx.save();
        ctx.beginPath();
        ctx.arc(player.x, player.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,215,0,${0.35 + pulse * 0.45})`;
        ctx.lineWidth   = 3;
        ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 18;
        ctx.stroke();
        ctx.restore();
    }

    // Invincibility flicker
    if (state.playerInvincible > 0 && Math.floor(Date.now() / 80) % 2 === 0) return;

    const skin = PLAYER_SKINS[state.selectedPlayerSkin];
    const color = getPlayerColor();
    ctx.save();
    ctx.shadowColor = skin.glowColor; ctx.shadowBlur = 18;
    ctx.fillStyle   = color;
    ctx.fillRect(player.x - player.w / 2, player.y - player.h / 2, player.w, player.h);
    ctx.fillStyle = skin.eyeColor;
    ctx.fillRect(player.x - 9, player.y - 7, 5, 5);
    ctx.fillRect(player.x + 4, player.y - 7, 5, 5);
    // Show skin badge for unlocked skins (each skin beyond index 0 gets a ★ badge)
    if (state.selectedPlayerSkin > 0) {
        const badge = '★'.repeat(state.selectedPlayerSkin);
        ctx.fillStyle = skin.glowColor;
        ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
        ctx.fillText(badge, player.x, player.y + player.h / 2 + 11);
    }
    ctx.restore();
}

// ── DRAW: PROJECTILES ─────────────────────────────────────────
function drawProjectiles() {
    for (const p of projectiles) {
        ctx.save();
        ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

function drawEnemyProjectiles() {
    for (const p of enemyProjectiles) {
        ctx.save();
        ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 16;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }
}

// ── DRAW: PARTICLES ───────────────────────────────────────────
function drawParticles() {
    for (const p of particles) {
        const a = p.life / p.maxLife;
        ctx.save();
        ctx.globalAlpha = a;
        if (p.confetti) {
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.cw / 2, -p.ch / 2, p.cw, p.ch);
        } else {
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.r * a), 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    }
}

// ── DRAW: PRE-LEVEL SCREEN ────────────────────────────────────
function drawPreLevel() {
    ctx.fillStyle = '#06001a';
    ctx.fillRect(0, 0, 800, 600);

    // Twinkling stars
    const t2 = Date.now() / 2000;
    for (let i = 0; i < 30; i++) {
        const sx = ((i * 137 + 80) % 740) + 30;
        const sy = ((i * 97  + 50) % 500) + 40;
        const al = 0.2 + 0.4 * Math.sin(t2 * 2.5 + i);
        ctx.fillStyle = `rgba(255,255,255,${al})`;
        ctx.fillRect(sx, sy, 2, 2);
    }

    // Title
    ctx.save();
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 28;
    ctx.fillStyle   = '#FFD700';
    ctx.font = 'bold 38px Arial'; ctx.textAlign = 'center';
    ctx.fillText(`LEVEL  ${state.currentLevel} / ${MAX_LEVELS}`, 400, 68);
    ctx.restore();

    ctx.fillStyle = 'rgba(210,210,255,0.85)';
    ctx.font = '18px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Choose your enemy\u2019s appearance:', 400, 108);

    // 5 skin choice buttons
    const btnW = 120, btnH = 150, gap = 16;
    const totalW = 5 * btnW + 4 * gap;
    const startX = (800 - totalW) / 2;
    const btnY = 130;
    const t3 = Date.now() / 400;

    ENEMY_SKINS.forEach((sk, idx) => {
        const bx = startX + idx * (btnW + gap);
        const cx = bx + btnW / 2;
        const cy = btnY + 60;
        const isSelected  = state.selectedEnemySkin === idx;
        const isHighlight = state.preLevelHighlight === idx;

        ctx.save();
        ctx.fillStyle = isSelected ? 'rgba(255,220,60,0.22)' : (isHighlight ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.05)');
        ctx.strokeStyle = isSelected ? '#FFD700' : (isHighlight ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)');
        ctx.lineWidth = isSelected ? 3 : 1.5;
        ctx.beginPath();
        const rad = 12;
        ctx.moveTo(bx + rad, btnY);
        ctx.arcTo(bx + btnW, btnY,     bx + btnW, btnY + btnH, rad);
        ctx.arcTo(bx + btnW, btnY + btnH, bx,    btnY + btnH, rad);
        ctx.arcTo(bx,        btnY + btnH, bx,    btnY,        rad);
        ctx.arcTo(bx,        btnY,      bx + btnW, btnY,      rad);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();

        // Mini enemy preview
        ctx.save();
        if (sk.type === 'fire') {
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = sk.accent;
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2 + t3;
                ctx.beginPath(); ctx.arc(cx + Math.cos(a) * 19, cy + Math.sin(a) * 19, 4, 0, Math.PI * 2); ctx.fill();
            }
        } else if (sk.type === 'ghost') {
            ctx.globalAlpha = 0.88;
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 14;
            ctx.beginPath();
            ctx.arc(cx, cy, 22, Math.PI, 0);
            ctx.lineTo(cx + 22, cy + 15); ctx.lineTo(cx + 11, cy + 5);
            ctx.lineTo(cx,       cy + 15); ctx.lineTo(cx - 11, cy + 5);
            ctx.lineTo(cx - 22, cy + 15);
            ctx.closePath(); ctx.fill();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#330055';
            ctx.beginPath(); ctx.arc(cx - 6, cy - 4, 4, 0, Math.PI * 2); ctx.arc(cx + 6, cy - 4, 4, 0, Math.PI * 2); ctx.fill();
        } else if (sk.type === 'shadow') {
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 18;
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(t3 * 0.8);
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2;
                const rr = i % 2 === 0 ? 22 : 11;
                i === 0 ? ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr) : ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
            }
            ctx.closePath(); ctx.fill();
            ctx.restore();
        } else if (sk.type === 'crystal') {
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 14;
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(t3 * 0.5);
            ctx.beginPath();
            ctx.moveTo(0, -22); ctx.lineTo(13, -4); ctx.lineTo(13, 13);
            ctx.lineTo(0, 22);  ctx.lineTo(-13, 13); ctx.lineTo(-13, -4);
            ctx.closePath(); ctx.fill();
            ctx.restore();
        } else { // slime
            ctx.fillStyle = sk.color; ctx.shadowColor = sk.glowColor; ctx.shadowBlur = 10;
            ctx.beginPath();
            for (let i = 0; i <= 32; i++) {
                const a = (i / 32) * Math.PI * 2;
                const wobble = 22 + Math.sin(a * 4 + t3 * 3) * 4;
                i === 0 ? ctx.moveTo(cx + Math.cos(a) * wobble, cy + Math.sin(a) * wobble)
                        : ctx.lineTo(cx + Math.cos(a) * wobble, cy + Math.sin(a) * wobble);
            }
            ctx.closePath(); ctx.fill();
        }
        ctx.restore();

        ctx.fillStyle = isSelected ? '#FFD700' : 'rgba(210,210,255,0.8)';
        ctx.font = `bold 12px Arial`; ctx.textAlign = 'center';
        ctx.fillText(sk.name, cx, btnY + btnH - 20);
        if (isSelected) {
            ctx.fillStyle = '#FFD700'; ctx.font = 'bold 10px Arial';
            ctx.fillText('\u2714 selected', cx, btnY + btnH - 6);
        }
    });

    // Current player skin display
    const psk = PLAYER_SKINS[state.selectedPlayerSkin];
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px Arial'; ctx.textAlign = 'center';
    ctx.fillText(`Your skin: ${psk.name}`, 400, 310);
    if (state.unlockedPlayerSkins.length > 1) {
        ctx.fillStyle = 'rgba(200,200,200,0.55)';
        ctx.font = '11px Arial';
        ctx.fillText('\u2190 / \u2192 to cycle skins', 400, 328);
    }

    // Start Level button
    const sbx = 300, sby = 348, sbw = 200, sbh = 52;
    ctx.save();
    ctx.shadowColor = '#4488FF'; ctx.shadowBlur = 22;
    ctx.fillStyle   = 'rgba(20,60,180,0.85)';
    ctx.beginPath();
    const sr = 10;
    ctx.moveTo(sbx + sr, sby);
    ctx.arcTo(sbx + sbw, sby,      sbx + sbw, sby + sbh, sr);
    ctx.arcTo(sbx + sbw, sby + sbh, sbx,      sby + sbh, sr);
    ctx.arcTo(sbx,       sby + sbh, sbx,      sby,       sr);
    ctx.arcTo(sbx,       sby,       sbx + sbw, sby,      sr);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#6699FF'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
    ctx.fillText('START LEVEL', 400, sby + 33);
    ctx.restore();
}

// ── DRAW: LEVEL DONE SCREEN ───────────────────────────────────
function drawLevelDone() {

    ctx.shadowColor = '#44FF88'; ctx.shadowBlur = 45;

    ctx.font = '22px Arial'; ctx.textAlign = 'center';

    // Orbiting stars
    const t4 = Date.now() / 300;
    for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 + t4;

// ── DRAW: SKIN UNLOCK SCREEN ──────────────────────────────────
function drawSkinUnlock() {
    ctx.fillStyle = '#05000f';
    ctx.fillRect(0, 0, 800, 600);

    // Sparkle background
    const t5 = Date.now() / 800;
    for (let i = 0; i < 40; i++) {
        const sx = ((i * 181 + 40) % 720) + 40;
        const sy = ((i * 113 + 60) % 480) + 60;
        const al = 0.15 + 0.5 * Math.abs(Math.sin(t5 * 1.8 + i));
        const sparkleColors = ['255,200,50', '255,136,255', '136,221,255'];
        ctx.fillStyle = `rgba(${sparkleColors[i % 3]},${al})`;
        ctx.fillRect(sx, sy, 2, 2);
    }

    const unlockedIdx = getUnlockedSkinIndex();  // which skin was just unlocked (1-4)
    const newSkin = PLAYER_SKINS[unlockedIdx];

    ctx.save();
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 50;
    ctx.fillStyle   = '#FFD700';
    ctx.font = 'bold 42px Arial'; ctx.textAlign = 'center';
    ctx.fillText('NEW SKIN UNLOCKED!', 400, 80);
    ctx.restore();

    ctx.fillStyle = 'rgba(255,220,100,0.9)';
    ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center';
    ctx.fillText(newSkin.name, 400, 128);

    // Large animated skin preview (player character)
    const px2 = 400, py2 = 240, pw2 = 64, ph2 = 64;
    const pulse = 0.6 + 0.4 * Math.sin(t5 * 2.5);
    ctx.save();
    ctx.shadowColor = newSkin.glowColor; ctx.shadowBlur = 30 * pulse;
    ctx.fillStyle   = newSkin.baseColor;
    ctx.fillRect(px2 - pw2 / 2, py2 - ph2 / 2, pw2, ph2);
    ctx.fillStyle = newSkin.eyeColor;
    ctx.fillRect(px2 - 12, py2 - 10, 7, 7);
    ctx.fillRect(px2 + 5,  py2 - 10, 7, 7);
    ctx.restore();

    // Orbiting stars around preview
    for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 + t5;
        drawStar(px2 + Math.cos(a) * 60, py2 + Math.sin(a) * 60 * 0.5, 10, '#FFD700');
    }

    // All unlocked skin slots
    ctx.fillStyle = 'rgba(210,210,255,0.75)';
    ctx.font = '14px Arial'; ctx.textAlign = 'center';
    ctx.fillText('All your skins:', 400, 320);

    const slotW = 80, slotGap = 12;
    const totalSlots = unlockedIdx + 1;
    const slotsStartX = 400 - (totalSlots * slotW + (totalSlots - 1) * slotGap) / 2;

    for (let s = 0; s <= unlockedIdx; s++) {
        const sk2 = PLAYER_SKINS[s];
        const sx2 = slotsStartX + s * (slotW + slotGap);
        const sy2 = 335;
        const isNew = s === unlockedIdx;
        ctx.save();
        ctx.fillStyle = isNew ? 'rgba(255,220,60,0.25)' : 'rgba(255,255,255,0.08)';
        ctx.strokeStyle = isNew ? '#FFD700' : 'rgba(255,255,255,0.3)';
        ctx.lineWidth = isNew ? 2.5 : 1.5;
        ctx.beginPath(); ctx.roundRect(sx2, sy2, slotW, 80, 8); ctx.fill(); ctx.stroke();
        ctx.fillStyle = sk2.baseColor;
        ctx.fillRect(sx2 + 20, sy2 + 10, 40, 40);
        ctx.fillStyle = sk2.eyeColor;
        ctx.fillRect(sx2 + 20 + 8,  sy2 + 20, 5, 5);
        ctx.fillRect(sx2 + 20 + 27, sy2 + 20, 5, 5);
        ctx.fillStyle = isNew ? '#FFD700' : 'rgba(200,200,200,0.7)';
        ctx.font = `bold 9px Arial`; ctx.textAlign = 'center';
        ctx.fillText(sk2.name, sx2 + slotW / 2, sy2 + 72);
        ctx.restore();
        if (isNew) {
            ctx.fillStyle = '#FFD700'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
            ctx.fillText('NEW!', sx2 + slotW / 2, sy2 + 6);
        }
    }

    // Equip new skin + Continue button
    const ebx = 230, eby = 450, ebw = 160, ebh = 46;
    ctx.save();
    ctx.fillStyle = 'rgba(180,100,0,0.85)';
    ctx.beginPath(); ctx.roundRect(ebx, eby, ebw, ebh, 8); ctx.fill();
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center';
    ctx.fillText('EQUIP NEW SKIN', ebx + ebw / 2, eby + 29);
    ctx.restore();

    const kbx = 410, kby = 450, kbw = 160, kbh = 46;
    ctx.save();
    ctx.fillStyle = 'rgba(20,60,180,0.85)';
    ctx.beginPath(); ctx.roundRect(kbx, kby, kbw, kbh, 8); ctx.fill();
    ctx.strokeStyle = '#6699FF'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center';
    ctx.fillText('KEEP CURRENT', kbx + kbw / 2, kby + 29);
    ctx.restore();

    ctx.fillStyle = 'rgba(150,150,150,0.5)';
    ctx.font = '11px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Press SPACE to equip new skin and continue', 400, 510);
}

// ── DRAW: HUD ─────────────────────────────────────────────────
function drawHUD() {
    // Taller HUD when ammo bar is shown
    const hudH = (state.power !== POWER.NONE && state.room !== ROOM.VOID) ? 68 : 46;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, 800, hudH);

    // Level indicator
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 17px Arial'; ctx.textAlign = 'left';
    if (state.room === ROOM.PARADISE) {
        ctx.fillText(`Level: ${state.currentLevel}/${MAX_LEVELS}`, 14, 28);
    } else {
        ctx.fillText('THE VOID / HELL', 14, 28);
    }
    // Skin name
    const sk3 = PLAYER_SKINS[state.selectedPlayerSkin];
    ctx.fillStyle = sk3.glowColor;
    ctx.font = '11px Arial'; ctx.textAlign = 'left';
    ctx.fillText(`Skin: ${sk3.name}`, 14, 42);

    // HP hearts
    ctx.font = '18px Arial'; ctx.textAlign = 'center';
    let hearts = '';
    for (let i = 0; i < 5; i++) hearts += i < state.playerHp ? '❤' : '♡';
    ctx.fillStyle = '#FF4444';
    ctx.fillText(hearts, 400, 20);

    // Room name + level label
    const cfg      = getLevelCfg();
    const lvlLabel = cfg.isBoss ? `LEVEL ${state.currentLevel} — BOSS!` : `LEVEL ${state.currentLevel}`;
    const roomName = state.room === ROOM.PARADISE
        ? `PARADISE  ·  ${lvlLabel}`
        : (state.room === ROOM.HELL ? 'HELL' : 'THE VOID');
    ctx.fillStyle = cfg.isBoss ? 'rgba(255,100,50,0.85)' : 'rgba(255,255,255,0.5)';
    ctx.font = cfg.isBoss ? 'bold 11px Arial' : '11px Arial';
    ctx.fillText(roomName, 400, 38);

    // Power
    const pc = { None: '#888', Ice: '#4488FF', Brimstone: '#FF4422' };
    ctx.fillStyle = pc[state.power];
    ctx.font = 'bold 17px Arial'; ctx.textAlign = 'right';
    ctx.fillText(`Power: ${state.power}`, 786, 28);

    // ── AMMO BAR ──────────────────────────────────────────────
    if (state.power !== POWER.NONE && state.room !== ROOM.VOID) {
        const bx = 14, by = 54, bh = 10, bw = 130;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);

        if (state.ammoReloading) {
            const pct = 1 - state.ammoReloadTimer / getLevelCfg().reloadFrames;
            ctx.fillStyle = '#FF8800';
            ctx.fillRect(bx, by, bw * pct, bh);
            ctx.fillStyle = '#FFA500';
            ctx.font = 'bold 9px Arial'; ctx.textAlign = 'left';
            const secsLeft = Math.ceil(state.ammoReloadTimer / 60);
            ctx.fillText(`RELOADING… ${secsLeft}s`, bx + 2, by + bh - 1);
        } else {
            const bulletW = Math.floor(bw / state.ammoMax) - 2;
            for (let i = 0; i < state.ammoMax; i++) {
                ctx.fillStyle = i < state.ammo ? '#4FC3F7' : '#333';
                ctx.fillRect(bx + i * (bulletW + 2), by, bulletW, bh);
            }
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.font = '9px Arial'; ctx.textAlign = 'left';
            ctx.fillText(`AMMO ${state.ammo}/${state.ammoMax}`, bx + 2, by + bh - 1);
        }
    }

    // ── COINS ─────────────────────────────────────────────────
    ctx.save();
    ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFAA00'; ctx.shadowBlur = 6;
    ctx.font = 'bold 14px Arial'; ctx.textAlign = 'left';
    ctx.fillText(`🪙 ${state.coins}`, 14, 46);
    ctx.restore();
}

// ── DRAW: RAINBOW BACKGROUND ──────────────────────────────────
function drawRainbowBg() {
    const t    = Date.now() / 2200;
    const grad = ctx.createLinearGradient(0, 0, 800, 600);
    grad.addColorStop(0,    `hsl(${(t * 60)       % 360}, 85%, 12%)`);
    grad.addColorStop(0.25, `hsl(${(t * 60 + 90)  % 360}, 85%, 12%)`);
    grad.addColorStop(0.5,  `hsl(${(t * 60 + 180) % 360}, 85%, 12%)`);
    grad.addColorStop(0.75, `hsl(${(t * 60 + 270) % 360}, 85%, 12%)`);
    grad.addColorStop(1,    `hsl(${(t * 60 + 360) % 360}, 85%, 12%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 800, 600);
}

// ── DRAW: LEVEL COMPLETE ──────────────────────────────────────
function drawLevelComplete() {
    ctx.fillStyle = 'rgba(0,0,0,0.60)';
    ctx.fillRect(0, 0, 800, 600);

    const cfg = getLevelCfg();
    ctx.save();
    ctx.shadowColor = '#4FC3F7'; ctx.shadowBlur = 50;
    ctx.fillStyle   = '#4FC3F7';
    ctx.font = 'bold 52px Arial'; ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${state.currentLevel} COMPLETE!`, 400, 195);
    ctx.restore();

    ctx.save();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '22px Arial'; ctx.textAlign = 'center';
    const bossMsg  = state.currentLevel < MAX_LEVELS && (() => {
        const nl = state.currentLevel + 1;
        if (nl <= 6) return LEVEL_CONFIGS[0];
        if (nl <= 13) return LEVEL_CONFIGS[1];
        return LEVEL_CONFIGS[2];
    })().isBoss ? '  ⚠ BOSS LEVEL NEXT!' : '';
    ctx.fillText(`Get ready for Level ${state.currentLevel + 1}…${bossMsg}`, 400, 260);
    ctx.restore();

    // Difficulty preview (only if a next level exists)
    if (state.currentLevel < MAX_LEVELS) {
        const nextCfg = (() => {
            const nl = state.currentLevel + 1;
            if (nl <= 6) return LEVEL_CONFIGS[0];
            if (nl <= 13) return LEVEL_CONFIGS[1];
            return LEVEL_CONFIGS[2];
        })();
        ctx.fillStyle = 'rgba(255,200,100,0.8)';
        ctx.font = '15px Arial'; ctx.textAlign = 'center';
        const hints = [];
        if (nextCfg.ammoMax < cfg.ammoMax)           hints.push(`Ammo: ${nextCfg.ammoMax} bullets`);
        if (nextCfg.reloadFrames > cfg.reloadFrames) hints.push(`Reload: ${(nextCfg.reloadFrames/60).toFixed(0)}s`);
        if (nextCfg.devilHp > cfg.devilHp)           hints.push(`Boss HP: ${nextCfg.devilHp}`);
        if (hints.length) ctx.fillText('Next level: ' + hints.join('  |  '), 400, 310);
    }

    // Orbiting stars
    const t = Date.now() / 300;
    for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 + t;
        drawStar(400 + Math.cos(a) * 110, 370 + Math.sin(a) * 42,
            14 + Math.sin(t + i) * 4, '#4FC3F7');
    }

    // Next Level button
    ctx.save();
    ctx.shadowColor = '#4FC3F7'; ctx.shadowBlur = 20;
    ctx.fillStyle   = '#0a2840';
    ctx.fillRect(300, 420, 200, 55);
    ctx.strokeStyle = '#4FC3F7'; ctx.lineWidth = 2;
    ctx.strokeRect(300, 420, 200, 55);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
    ctx.fillText('Next Level  ▶', 400, 454);
    ctx.restore();
}
