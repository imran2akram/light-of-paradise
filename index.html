// ── DRAW: SHOP ────────────────────────────────────────────────
function drawShop() {
    if (!state.shopOpen) return;

    const W = 360, H = 280, SX = (800 - W) / 2, SY = (600 - H) / 2;
    ctx.save();
    ctx.fillStyle   = 'rgba(10,5,25,0.93)';
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth   = 2;
    ctx.fillRect(SX, SY, W, H);
    ctx.strokeRect(SX, SY, W, H);

    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
    ctx.fillText('✦ AVATAR SHOP ✦', 400, SY + 30);

    ctx.fillStyle = 'rgba(255,215,0,0.8)';
    ctx.font = '14px Arial';
    ctx.fillText(`Your coins: 🪙 ${state.coins}`, 400, SY + 52);

    ctx.font = '12px Arial'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('Press 1-5 to equip / unlock  |  E to close', 400, SY + 68);

    for (let i = 0; i < AVATAR_COLORS.length; i++) {
        const col = AVATAR_COLORS[i];
        const name = AVATAR_NAMES[i];
        const cost = AVATAR_UNLOCK_COST[i];
        const unlocked = state.unlockedSkins[i];
        const active   = state.activeSkin === i;

        const ix = SX + 36 + i * 64;
        const iy = SY + 130;

        // Slot background
        ctx.fillStyle = active ? 'rgba(255,215,0,0.25)' : 'rgba(255,255,255,0.06)';
        ctx.strokeStyle = active ? '#FFD700' : (unlocked ? '#666' : '#333');
        ctx.lineWidth = active ? 2 : 1;
        ctx.fillRect(ix - 20, iy - 20, 40, 52);
        ctx.strokeRect(ix - 20, iy - 20, 40, 52);

        // Avatar preview
        ctx.fillStyle = unlocked ? col : '#444';
        ctx.fillRect(ix - 10, iy - 10, 20, 20);

        // Key hint
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
        ctx.fillText(`[${i + 1}]`, ix, iy + 18);

        // Name
        ctx.fillStyle = unlocked ? col : '#555';
        ctx.font = '10px Arial';
        ctx.fillText(name, ix, iy + 30);

        // Cost or ✓
        if (!unlocked) {
            ctx.fillStyle = state.coins >= cost ? '#FFD700' : '#886';
            ctx.font = 'bold 9px Arial';
            ctx.fillText(`🪙${cost}`, ix, iy + 42);
        } else if (active) {
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 11px Arial';
            ctx.fillText('✓', ix, iy + 42);
        }
    }
    ctx.restore();
}

// ── DRAW: CONTROLS ────────────────────────────────────────────
function drawControls() {
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.font = '11px Arial'; ctx.textAlign = 'right';
    const hint = isTouchDevice
        ? 'Move: joystick  |  Shoot: button'
        : 'Move: WASD / Arrows  |  Shoot: Spacebar';
    ctx.fillText(hint, 792, 592);
}

function drawVirtualControls() {
    if (!isTouchDevice || state.gamePhase === 'intro' || state.gamePhase === 'prelevel' ||
        state.gamePhase === 'leveldone' || state.gamePhase === 'skinunlock' || state.won) return;
    ctx.save();

    // Joystick base
    ctx.beginPath();
    ctx.arc(VJOY.x, VJOY.y, VJOY.baseR, 0, Math.PI * 2);
    ctx.fillStyle   = 'rgba(255,255,255,0.10)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth   = 2;
    ctx.stroke();

    // Joystick stick
    ctx.beginPath();
    ctx.arc(VJOY.x + vTouch.joyDX, VJOY.y + vTouch.joyDY, 22, 0, Math.PI * 2);
    ctx.fillStyle   = 'rgba(255,255,255,0.28)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.60)';
    ctx.lineWidth   = 2;
    ctx.stroke();

    // Shoot button
    ctx.beginPath();
    ctx.arc(VSHOOT.x, VSHOOT.y, VSHOOT.r, 0, Math.PI * 2);
    ctx.fillStyle   = vTouch.shootId !== null ? 'rgba(255,220,50,0.40)' : 'rgba(255,220,50,0.15)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,220,50,0.70)';
    ctx.lineWidth   = 2;
    ctx.stroke();
    ctx.fillStyle   = 'rgba(255,255,255,0.80)';
    ctx.font        = 'bold 13px Arial';
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SHOOT', VSHOOT.x, VSHOOT.y);

    ctx.restore();
}

// ── MAIN LOOP ─────────────────────────────────────────────────
function update() {
    if (state.gamePhase === 'intro') return;

    updatePlayer();
    if (!state.won) {
        updateEnemies();
        updateProjectiles();
        updateEnemyProjectiles();
        checkPickups();
        updateVoidHealing();
        checkLevelComplete();
        updateAmmo();
    }
    updateParticles();
    if (state.screenShake > 0) state.screenShake--;

    // Fire confetti once on win or level complete
    if (state.won && !state.confettiSpawned) {
        state.confettiSpawned = true;
        spawnConfetti();
    }
}

function draw() {
    ctx.save();
    if (state.screenShake > 0) {
        const s = state.screenShake * 0.8;
        ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
    }

    if (state.gamePhase === 'intro') {
        drawIntro();
        ctx.restore();
        return;
    }

    if (state.gamePhase === 'prelevel') {
        drawPreLevel();
        ctx.restore();
        return;
    }

    if (state.gamePhase === 'leveldone') {
        // Draw game world behind overlay
        const bg2 = { void: voidBgColor, hell: '#1a0000', paradise: '#001a1a' };
        ctx.fillStyle = bg2[state.room] || '#001a1a';
        ctx.fillRect(0, 0, 800, 600);
        if (state.room === ROOM.PARADISE) drawParadise();
        drawPlayer();
        drawParticles();
        drawHUD();
        drawLevelDone();
        ctx.restore();
        return;
    }

    if (state.gamePhase === 'skinunlock') {
        drawSkinUnlock();
        ctx.restore();
        return;
    }

    // Background
    if (state.won) {
        drawRainbowBg();
    } else {
        const bg = { void: voidBgColor, hell: '#1a0000', paradise: '#001a1a' };
        ctx.fillStyle = bg[state.room];
        ctx.fillRect(0, 0, 800, 600);
    }

    // Subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
    for (let x = 0; x <= 800; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 600); ctx.stroke(); }
    for (let y = 0; y <= 600; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(800, y); ctx.stroke(); }

    if (!state.won) drawPortals();
    if (state.room === ROOM.VOID)     drawVoid();
    if (state.room === ROOM.HELL)     drawHell();
    if (state.room === ROOM.PARADISE) drawParadise();
    drawPlayer();
    drawProjectiles();
    drawEnemyProjectiles();
    drawParticles();
    drawHUD();
    drawControls();
    drawVirtualControls();
    drawShop();

    if (state.won)           drawWin();

    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
